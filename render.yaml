services:
  - type: keyvalue
    name: finance-cache
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: finance-web-ui
    runtime: static
    autoDeployTrigger: commit
    buildCommand: cd web_ui && npm install && npm run build
    staticPublishPath: web_ui/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        value: https://finance-api.rxlab.workers.dev
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: finance-web-ui-dev
    runtime: static
    autoDeployTrigger: commit
    branch: dev
    buildCommand: cd web_ui && npm install && npm run build
    staticPublishPath: web_ui/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        value: https://finance-api-dev.rxlab.workers.dev
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
