name = "finance-api"
main = "src/index.js"
compatibility_date = "2026-06-27"
workers_dev = true

[vars]
SHARED_WATCHLIST_SLUG = "drama"
SHARED_WATCHLIST_DISPLAY_NAME = "Drama"
RESEARCH_ENABLED = "false"
RESEARCH_DECISION_SUPPORT_ENABLED = "false"
RESEARCH_MODEL_STATUS = "unavailable"

[durable_objects]
bindings = [
  { name = "SHARED_WATCHLIST_SPACE", class_name = "SharedWatchlistSpace" },
  { name = "RESEARCH_JOBS", class_name = "ResearchJob" },
  { name = "RESEARCH_RATE_LIMITER", class_name = "ResearchRateLimiter" },
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SharedWatchlistSpace"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["ResearchJob", "ResearchRateLimiter"]
